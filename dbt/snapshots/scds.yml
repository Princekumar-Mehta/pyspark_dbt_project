snapshots:
  - name: dim_customers
    relation: source('source_silver','customers') # source('my_source', 'my_table') or ref('my_model')
    config:
      database: pyspark_dbt
      schema: gold
      strategy: timestamp
      unique_key: customer_id
      updated_at: last_updated_timestamp
      dbt_valid_to_current: "to_date('9999-12-31')"

